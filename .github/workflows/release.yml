name: Release

on:
  push:
    tags: ["v*"]

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-go@v5
        with:
          go-version: "1.26"

      - uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: npm
          cache-dependency-path: ui/package-lock.json

      - name: Build frontend
        run: cd ui && npm ci && npx vite build

      - name: Build binaries
        run: |
          VERSION=${GITHUB_REF_NAME}
          LDFLAGS="-s -w -X main.version=${VERSION}"
          GOOS=linux   GOARCH=amd64 go build -ldflags="$LDFLAGS" -o bin/nats-dashboard-linux-amd64       ./cmd/nats-dashboard
          GOOS=darwin  GOARCH=amd64 go build -ldflags="$LDFLAGS" -o bin/nats-dashboard-darwin-amd64      ./cmd/nats-dashboard
          GOOS=darwin  GOARCH=arm64 go build -ldflags="$LDFLAGS" -o bin/nats-dashboard-darwin-arm64      ./cmd/nats-dashboard
          GOOS=windows GOARCH=amd64 go build -ldflags="$LDFLAGS" -o bin/nats-dashboard-windows-amd64.exe ./cmd/nats-dashboard

      - name: Create release archives
        run: |
          cd bin
          tar czf nats-dashboard-linux-amd64.tar.gz    nats-dashboard-linux-amd64
          tar czf nats-dashboard-darwin-amd64.tar.gz   nats-dashboard-darwin-amd64
          tar czf nats-dashboard-darwin-arm64.tar.gz   nats-dashboard-darwin-arm64
          zip     nats-dashboard-windows-amd64.zip      nats-dashboard-windows-amd64.exe

      - name: Create GitHub release
        uses: softprops/action-gh-release@v2
        with:
          generate_release_notes: true
          files: |
            bin/nats-dashboard-linux-amd64.tar.gz
            bin/nats-dashboard-darwin-amd64.tar.gz
            bin/nats-dashboard-darwin-arm64.tar.gz
            bin/nats-dashboard-windows-amd64.zip
